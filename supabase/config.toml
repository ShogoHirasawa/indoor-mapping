# Supabase configuration for indoor-mapping
# Link to existing project: supabase link --project-ref <project-id>
# https://supabase.com/docs/guides/cli/config

project_id = "indoor-mapping"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public", "indoor"]
extra_search_path = ["public", "extensions", "indoor"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]

[storage]
enabled = true
file_size_limit = "50MiB"
